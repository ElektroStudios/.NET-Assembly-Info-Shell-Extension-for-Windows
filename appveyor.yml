# ------------------------------------------
# CUSTOMIZABLE TEMPLATE REPOSITORY VARIABLES
# 
environment:
  APP_DIR_NAME: "NET Assembly Info ShellEx"
  SOLUTION_EXT: "sln"
# ------------------------------------------

version: CI Build {Build}
skip_commits:
  files:
  - '.github/**/*'
  - 'Docs/**/*'
  - 'Documents/**/*'
  - 'Manual/**/*'
  - 'Images/**/*'
  - 'Scripts/**/*'
  - 'Website/**/*'
  - '*.md'
  - '*.zip'
  - '*.yml'
image: Visual Studio 2026
configuration: Release
install:
  - >-
    choco install chocolatey-dotnetfx.extension --no-progress -y
  - ps: >-
      if (-not (Test-Path "C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.8.1")) {
        choco install netfx-4.8.1-devpack --ignore-dependencies --no-progress -y
      } else {
        Write-Host ".NET Framework 4.8.1 Developer Pack ya presente en la imagen, saltando instalacion."
      }
  - >-
    git submodule update --init --recursive
before_build:
  - >-
    nuget restore "Source\%APP_DIR_NAME%.%SOLUTION_EXT%"
  - >-
    dotnet nuget locals all --clear
build:
  project: Source\%APP_DIR_NAME%.%SOLUTION_EXT%
  parallel: true
after_build:
  - >-
    7z a -r "%APPVEYOR_PROJECT_NAME%_Build_%APPVEYOR_BUILD_NUMBER%.zip" ^
    ".\Source\%APP_DIR_NAME%\bin\*" 
artifacts:
  - path: "%APPVEYOR_PROJECT_NAME%_Build_%APPVEYOR_BUILD_NUMBER%.zip"
    name: "%APPVEYOR_PROJECT_NAME%"